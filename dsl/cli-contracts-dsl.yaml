version: 1
system:
  id: cli-contracts-agent
  name: CLI Contracts Agent System
  default_workflow_order:
    - cli-audit
    - reference-conformance-check

agents: { $ref: "./agents/" }
tasks: { $ref: "./tasks.yaml" }
handoff_types: { $ref: "./handoff-types.yaml" }

components:
  schemas:
    AgentEvidence:
      type: object
      description: >-
        Evidence supporting an agent finding.
        Canonical schema: agent-contracts components.schemas.agent-evidence
      required: [kind]
      properties:
        kind:
          type: string
          enum: [file, command, schema, diff, stdout, stderr, text]
        target:
          type: string
        location:
          type: string
        excerpt:
          type: string

    AgentFinding:
      type: object
      description: >-
        A single finding from an agent audit.
        Canonical schema: agent-contracts components.schemas.agent-finding
      required: [severity, category, message]
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [info, warning, error, critical]
        category:
          type: string
        target:
          type: string
        location:
          type: string
        message:
          type: string
        recommendation:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/AgentEvidence"
        details:
          type: object
          additionalProperties: true

    AgentRecommendedAction:
      type: object
      description: >-
        A recommended action from an agent audit.
        Canonical schema: agent-contracts components.schemas.agent-recommended-action
      required: [kind, title]
      properties:
        kind:
          type: string
          enum: [run_command, edit_file, review, confirm, block, ignore]
        title:
          type: string
        command:
          type: string
        target:
          type: string
        rationale:
          type: string

    AgentAuditResult:
      type: object
      description: >-
        Top-level result from an agent audit.
        Canonical schema: agent-contracts components.schemas.agent-audit-result
      required: [summary, riskLevel, findings]
      properties:
        summary:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        findings:
          type: array
          items:
            $ref: "#/components/schemas/AgentFinding"
        recommendedActions:
          type: array
          items:
            $ref: "#/components/schemas/AgentRecommendedAction"
        metadata:
          type: object
          properties:
            tool:
              type: string
            command:
              type: string
            version:
              type: string
            generatedAt:
              type: string
            adapter:
              type: string
            model:
              type: string
