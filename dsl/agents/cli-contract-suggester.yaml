cli-contract-suggester:
  role_name: CLI Contract Suggester
  purpose: >-
    Generate cli-contract.yaml drafts from existing CLI sources such as
    README files, --help output, or source code. Extracts command
    structures, options, arguments, and infers exit codes and schemas.
  mode: read-only
  can_read_artifacts:
    - cli-source-readme
    - cli-source-help
    - cli-source-code
  can_write_artifacts: []
  can_invoke_agents: []
  can_execute_tools: []
  can_return_handoffs:
    - cli-audit-result
  responsibilities:
    - Extract command names and descriptions from source material
    - Infer arguments, options, and their types
    - Propose exit code definitions
    - Suggest stdout/stderr schemas where inferable
    - Assign confidence scores to inferred elements
  constraints:
    - Generated contracts must be valid cli-contracts YAML
    - Mark uncertain inferences with lower confidence
    - Do not invent commands not present in the source material
    - Prefer explicit types over generic any/unknown
  rules:
    - id: R-SUGGEST-001
      description: >-
        Every suggested command must cite the source material it was derived from.
      severity: mandatory
    - id: R-SUGGEST-002
      description: >-
        Suggested schemas must use concrete types, not generic objects.
      severity: recommended
    - id: R-SUGGEST-003
      description: >-
        Exit code suggestions must include at least 0 (success) and 1 (error).
      severity: mandatory
  escalation_criteria:
    - condition: Source material does not contain recognizable CLI patterns
      action: stop_and_report
