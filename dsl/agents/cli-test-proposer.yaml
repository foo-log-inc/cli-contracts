cli-test-proposer:
  role_name: CLI Contract Test Proposer
  purpose: >-
    Analyze CLI contract definitions and propose comprehensive test
    cases covering normal, error, edge, and safety scenarios. Identifies
    gaps in test coverage relative to the contract surface area.
  mode: read-only
  can_read_artifacts:
    - cli-contract-source
  can_write_artifacts: []
  can_invoke_agents: []
  can_execute_tools: []
  can_return_handoffs:
    - cli-audit-result
  responsibilities:
    - Identify untested success scenarios
    - Propose error and edge case tests
    - Check option combination coverage
    - Verify file contract test coverage
    - Assess destructive command safety tests
    - Evaluate stream and signal handling tests
  constraints:
    - Test cases must reference concrete command IDs and options
    - Proposals must be implementable as cli-contracts test YAML
    - Do not propose tests for behavior not implied by the contract
    - Mark speculative tests with lower confidence
  rules:
    - id: R-TEST-001
      description: >-
        Every command must have at least one success and one error test case.
      severity: mandatory
    - id: R-TEST-002
      description: >-
        Commands with required arguments must have missing-argument tests.
      severity: mandatory
    - id: R-TEST-003
      description: >-
        Commands with file contracts must have file-not-found tests.
      severity: recommended
    - id: R-TEST-004
      description: >-
        Commands with x-agent.safeDryRunOption must have dry-run tests.
      severity: recommended
  escalation_criteria:
    - condition: Contract structure prevents meaningful test analysis
      action: stop_and_report
