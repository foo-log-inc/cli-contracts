cliContracts: 0.1.0

info:
  title: CLI Contracts CLI
  version: 0.2.1
  description: >-
    Contract definition for the cli-contracts command line tool itself.
    This is a self-referential contract: cli-contracts defines its own interface
    using the CLI Contracts specification.
  license:
    name: MIT
  contact:
    name: foo-ogawa
    url: https://github.com/foo-ogawa/cli-contracts

commandSets:
  cli-contracts:
    summary: Contract-first specification and toolchain for CLI interfaces.

    globalOptions:
      - name: config
        aliases: [c]
        description: Path to cli-contracts.config.yaml.
        valueName: file
        schema:
          type: string
          default: cli-contracts.config.yaml
        file:
          mode: read
          exists: false
          mediaType: application/yaml
          encoding: utf-8

      - name: verbose
        aliases: [v]
        description: Enable verbose output.
        schema:
          type: boolean
          default: false

      - name: format
        aliases: [F]
        description: Output format for structured results.
        valueName: format
        schema:
          type: string
          enum: [yaml, json]
          default: yaml

      - name: quiet
        aliases: [q]
        description: Suppress non-error output.
        schema:
          type: boolean
          default: false

      - name: version
        aliases: [V]
        description: Print version and exit.
        schema:
          type: boolean

      - name: help
        aliases: [h]
        description: Show help and exit.
        schema:
          type: boolean

    commands:
      # ── init ────────────────────────────────────────────
      init:
        summary: Initialize a contract file or project layout.
        description: >-
          Generates a starter cli-contract.yaml (and optionally
          cli-contracts.config.yaml) in the current directory.
        usage:
          - cli-contracts init
          - cli-contracts init --name foo
          - cli-contracts init --name foo --multi-command-set

        options:
          - name: name
            aliases: [n]
            description: Executable name for the initial command set.
            valueName: name
            schema:
              type: string

          - name: multi-command-set
            aliases: [m]
            description: Scaffold multiple command sets.
            schema:
              type: boolean
              default: false

          - name: output
            aliases: [o]
            description: Output directory.
            valueName: dir
            schema:
              type: string
              default: "."

          - name: with-config
            description: Also generate cli-contracts.config.yaml.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Project initialized successfully.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/InitResult'
            files:
              - path: '{stdout.contractFile}'
                required: true
                mediaType: application/yaml
                encoding: utf-8
              - path: '{stdout.configFile}'
                required: false
                mediaType: application/yaml
                encoding: utf-8

          '1':
            description: Unexpected error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '2':
            description: Invalid arguments.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '4':
            description: Target file already exists.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'


      # ── validate ────────────────────────────────────────
      validate:
        summary: Validate contract files.
        description: >-
          Validates contract syntax, JSON Schema conformance, $ref resolution,
          duplicate command IDs, option aliases, exit codes,
          stream definitions, file schema references,
          and config generator settings.
        usage:
          - cli-contracts validate
          - cli-contracts validate --file cli-contract.yaml
          - cli-contracts validate --strict

        options:
          - name: file
            aliases: [f]
            description: Contract file(s) to validate. Defaults to config input.files.
            valueName: file
            repeatable: true
            schema:
              type: string
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

          - name: strict
            description: Treat warnings as errors.
            schema:
              type: boolean
              default: false

          - name: resolve-refs
            description: Resolve and validate external $ref targets.
            schema:
              type: boolean
              default: true

        exits:
          '0':
            description: All contracts are valid.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/ValidateResult'

          '1':
            description: Unexpected error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '2':
            description: Invalid arguments.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '3':
            description: Validation failed. One or more errors found.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/ValidateResult'
            stderr:
              required: false
              format: text


      # ── generate ────────────────────────────────────────
      generate:
        summary: Run code generators.
        description: >-
          Runs one or more generators defined in cli-contracts.config.yaml.
          If no generator name is given, all enabled generators are run.
        usage:
          - cli-contracts generate
          - cli-contracts generate typescript
          - cli-contracts generate rust
          - cli-contracts generate markdown
          - cli-contracts generate custom-go

        arguments:
          - name: generators
            index: 0
            required: false
            description: Generator name(s) to run. If omitted, all enabled generators run.
            variadic: true
            schema:
              type: string

        options:
          - name: file
            aliases: [f]
            description: Contract file(s) to use as input.
            valueName: file
            repeatable: true
            schema:
              type: string
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

          - name: output
            aliases: [o]
            description: Override output directory.
            valueName: dir
            schema:
              type: string

          - name: dry-run
            aliases: [n]
            description: Show what would be generated without writing files.
            schema:
              type: boolean
              default: false

          - name: clean
            description: Remove output directory before generating.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Generation succeeded.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/GenerateResult'

          '1':
            description: Unexpected error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '2':
            description: Invalid arguments or unknown generator name.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '3':
            description: Contract validation failed (generation aborted).
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/ValidateResult'

          '5':
            description: Generation partially failed.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/GenerateResult'
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'


      # ── docs ────────────────────────────────────────────
      docs:
        summary: Generate Markdown documentation.
        description: >-
          Shortcut for generating Markdown CLI reference documentation.
          Equivalent to "cli-contracts generate markdown".
        usage:
          - cli-contracts docs
          - cli-contracts docs --output docs/cli.md

        options:
          - name: file
            aliases: [f]
            description: Contract file(s) to use as input.
            valueName: file
            repeatable: true
            schema:
              type: string
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

          - name: output
            aliases: [o]
            description: Output file path.
            valueName: file
            schema:
              type: string

        exits:
          '0':
            description: Documentation generated successfully.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/GenerateResult'

          '1':
            description: Unexpected error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '2':
            description: Invalid arguments.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '3':
            description: Contract validation failed (generation aborted).
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/ValidateResult'


      # ── test ────────────────────────────────────────────
      test:
        summary: Run contract tests.
        description: >-
          Executes contract test cases against a real CLI implementation.
          Uses execution profiles from cli-contracts.config.yaml to invoke commands.
        usage:
          - cli-contracts test
          - cli-contracts test --profile local
          - cli-contracts test --case users.import.success

        options:
          - name: profile
            aliases: [p]
            description: Execution profile to use.
            valueName: name
            schema:
              type: string

          - name: case
            description: Run a specific test case by ID.
            valueName: id
            repeatable: true
            schema:
              type: string

          - name: cases-dir
            description: Directory containing test case YAML files.
            valueName: dir
            schema:
              type: string

          - name: timeout
            aliases: [t]
            description: Timeout per test case in milliseconds.
            valueName: ms
            schema:
              type: integer
              default: 30000

          - name: bail
            description: Stop on first failure.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: All tests passed.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/TestResult'

          '1':
            description: Unexpected error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '2':
            description: Invalid arguments or missing profile.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '3':
            description: Contract validation failed (tests aborted).
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/ValidateResult'

          '6':
            description: One or more tests failed.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/TestResult'


      # ── diff ────────────────────────────────────────────
      diff:
        summary: Compare contract versions and detect breaking changes.
        description: >-
          Compares two contract files (or git revisions) and reports
          additions, removals, modifications, and breaking changes.
        usage:
          - cli-contracts diff old.yaml new.yaml
          - cli-contracts diff --base main --head HEAD

        arguments:
          - name: old
            index: 0
            required: false
            description: >-
              Path to the old (base) contract file.
              Can be omitted when using --base/--head.
            schema:
              type: string
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

          - name: new
            index: 1
            required: false
            description: >-
              Path to the new (head) contract file.
              Can be omitted when using --base/--head.
            schema:
              type: string
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

        options:
          - name: base
            description: Git ref for the base version (e.g. main, v1.0.0).
            valueName: ref
            schema:
              type: string

          - name: head
            description: Git ref for the head version (e.g. HEAD, feature-branch).
            valueName: ref
            schema:
              type: string

          - name: file
            aliases: [f]
            description: Contract file path within the repository (used with --base/--head).
            valueName: file
            schema:
              type: string
              default: cli-contract.yaml

          - name: breaking-only
            description: Only report breaking changes.
            schema:
              type: boolean
              default: false

          - name: text
            description: Output human-readable text summary instead of structured data.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: No breaking changes detected (may include non-breaking changes).
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/DiffResult'

          '1':
            description: Unexpected error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '2':
            description: Invalid arguments.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '7':
            description: Breaking changes detected.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/DiffResult'

      # ── propose-agent-policy ─────────────────────────────
      propose-agent-policy:
        summary: Detect missing or inconsistent x-agent policies via LLM.
        description: >-
          Analyzes CLI contract commands and proposes x-agent execution
          policies (riskLevel, requiresConfirmation, sideEffects, etc.)
          for commands that lack them. Uses agent-contracts-runtime as
          an optional peer dependency for LLM integration.
        usage:
          - cli-contracts propose-agent-policy cli-contract.yaml
          - cli-contracts propose-agent-policy --file cli-contract.yaml --adapter mock --dry-run
          - cli-contracts propose-agent-policy --file cli-contract.yaml --adapter gemini --format json

        options:
          - name: file
            aliases: [f]
            description: Contract file to analyze.
            valueName: file
            schema:
              type: string
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

          - name: adapter
            description: LLM adapter to use.
            valueName: name
            schema:
              type: string
              enum: [mock, cursor, claude, openai, gemini]

          - name: model
            description: Model name to pass to the adapter.
            valueName: name
            schema:
              type: string

          - name: dry-run
            description: Output the prompt context without making an LLM call.
            schema:
              type: boolean
              default: false

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            valueName: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            valueName: file
            schema:
              type: string

          - name: format
            description: Output format for the result.
            valueName: fmt
            schema:
              type: string
              enum: [json, text]
              default: json

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []
          safeDryRunOption: dry-run

        exits:
          '0':
            description: Completed without blocking findings.
            stdout:
              format: json
              schema:
                $ref: '#/components/schemas/AgentAuditResult'

          '1':
            description: Completed with blocking findings.
            stdout:
              format: json
              schema:
                $ref: '#/components/schemas/AgentAuditResult'

          '2':
            description: Invalid input or configuration.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '3':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '4':
            description: LLM provider or adapter error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

      # ── audit ──────────────────────────────────────────
      audit:
        summary: Semantic audit of CLI contract design quality.
        description: >-
          Performs a comprehensive audit of CLI contract design quality
          including responsibility boundaries, exit code consistency,
          output schema coverage, and AI-agent safety metadata.
          Uses agent-contracts-runtime as an optional peer dependency.
        usage:
          - cli-contracts audit cli-contract.yaml
          - cli-contracts audit --file cli-contract.yaml --checks agent-policy
          - cli-contracts audit --file cli-contract.yaml --adapter claude --dry-run

        options:
          - name: file
            aliases: [f]
            description: Contract file to audit.
            valueName: file
            schema:
              type: string
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

          - name: checks
            description: Audit dimension(s) to run.
            valueName: check
            repeatable: true
            schema:
              type: string
              enum: [agent-policy, responsibility, exit-code, output-schema, breaking-risk]

          - name: adapter
            description: LLM adapter to use.
            valueName: name
            schema:
              type: string
              enum: [mock, cursor, claude, openai, gemini]

          - name: model
            description: Model name to pass to the adapter.
            valueName: name
            schema:
              type: string

          - name: dry-run
            description: Output the prompt context without making an LLM call.
            schema:
              type: boolean
              default: false

          - name: fail-on
            description: Minimum severity that causes a non-zero exit.
            valueName: level
            schema:
              type: string
              enum: [warning, error, critical]
              default: error

          - name: output
            aliases: [o]
            description: Write result to a file instead of stdout.
            valueName: file
            schema:
              type: string

          - name: format
            description: Output format for the result.
            valueName: fmt
            schema:
              type: string
              enum: [json, text]
              default: json

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []
          safeDryRunOption: dry-run

        exits:
          '0':
            description: Completed without blocking findings.
            stdout:
              format: json
              schema:
                $ref: '#/components/schemas/AgentAuditResult'

          '1':
            description: Completed with blocking findings.
            stdout:
              format: json
              schema:
                $ref: '#/components/schemas/AgentAuditResult'

          '2':
            description: Invalid input or configuration.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '3':
            description: Runtime dependency missing (agent-contracts-runtime).
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '4':
            description: LLM provider or adapter error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

      # ── extract ─────────────────────────────────────────
      extract:
        summary: Extract a subset of the contract for specific commands.
        description: >-
          Extracts one or more commands from a contract file, resolving all
          $ref references inline. Useful for feeding a focused contract subset
          to AI agents or external tooling.
        usage:
          - cli-contracts extract init validate
          - cli-contracts extract --file cli-contract.yaml init
          - cli-contracts extract --all

        arguments:
          - name: commands
            index: 0
            required: false
            description: >-
              Command ID(s) to extract.
              Use dot notation for nested commands (e.g. users.import).
              If omitted, --all must be specified.
            variadic: true
            schema:
              type: string

        options:
          - name: file
            aliases: [f]
            description: Contract file to extract from. Defaults to config input.files.
            valueName: file
            schema:
              type: string
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

          - name: all
            aliases: [a]
            description: Extract all commands.
            schema:
              type: boolean
              default: false

          - name: include-meta
            description: Include extraction metadata (source, timestamp, etc.).
            schema:
              type: boolean
              default: true

        exits:
          '0':
            description: Extraction succeeded.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/ExtractResult'

          '1':
            description: Unexpected error.
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '2':
            description: Invalid arguments (no commands specified and --all not set).
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

          '3':
            description: Contract validation failed.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/ValidateResult'

          '8':
            description: One or more requested commands not found.
            stdout:
              format: yaml
              schema:
                $ref: '#/components/schemas/ExtractResult'
            stderr:
              format: json
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    InitResult:
      type: object
      required: [contractFile]
      properties:
        contractFile:
          type: string
          description: Path to the generated cli-contract.yaml.
        configFile:
          type: string
          description: Path to the generated cli-contracts.config.yaml (if --with-config).

    ValidateResult:
      type: object
      required: [valid, errorCount, warningCount, errors, warnings]
      properties:
        valid:
          type: boolean
        errorCount:
          type: integer
          minimum: 0
        warningCount:
          type: integer
          minimum: 0
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Diagnostic'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/Diagnostic'

    Diagnostic:
      type: object
      required: [path, message, rule]
      properties:
        path:
          type: string
          description: JSON pointer to the problematic location (e.g. /commandSets/foo/commands/init).
        message:
          type: string
        rule:
          type: string
          description: Validation rule ID (e.g. duplicate-command-id, invalid-exit-code).
        severity:
          type: string
          enum: [error, warning]

    GenerateResult:
      type: object
      required: [generators]
      properties:
        generators:
          type: array
          items:
            $ref: '#/components/schemas/GeneratorOutput'

    GeneratorOutput:
      type: object
      required: [name, status, files]
      properties:
        name:
          type: string
          description: Generator name (e.g. typescript, rust, markdown).
        status:
          type: string
          enum: [success, skipped, failed]
        files:
          type: array
          items:
            type: string
          description: List of generated file paths.
        error:
          type: string
          description: Error message if status is failed.

    TestResult:
      type: object
      required: [total, passed, failed, skipped, cases]
      properties:
        total:
          type: integer
          minimum: 0
        passed:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0
        skipped:
          type: integer
          minimum: 0
        durationMs:
          type: integer
          minimum: 0
        cases:
          type: array
          items:
            $ref: '#/components/schemas/TestCaseResult'

    TestCaseResult:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          description: Test case ID.
        status:
          type: string
          enum: [passed, failed, skipped]
        durationMs:
          type: integer
          minimum: 0
        violations:
          type: array
          items:
            $ref: '#/components/schemas/ContractViolation'

    ContractViolation:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum:
            - exit_code_mismatch
            - stdout_schema_mismatch
            - stderr_schema_mismatch
            - stdout_format_mismatch
            - stderr_format_mismatch
            - file_missing
            - file_schema_mismatch
        message:
          type: string
        expected:
          description: Expected value or schema excerpt.
        actual:
          description: Actual value received.

    ExtractResult:
      type: object
      required: [cliContracts, info, commandSets]
      description: >-
        A self-contained contract subset with all $ref resolved inline.
        When --include-meta is true, a _meta property is included.
      properties:
        _meta:
          $ref: '#/components/schemas/ExtractMeta'
        cliContracts:
          type: string
          description: Spec version from the source contract.
        info:
          type: object
          description: Info block from the source contract.
        commandSets:
          type: object
          description: Subset of command sets containing only the requested commands.
        components:
          type: object
          description: Only the schemas referenced by extracted commands.

    ExtractMeta:
      type: object
      required: [source, type, extractedAt, commands]
      properties:
        source:
          type: string
          description: Path to the source contract file.
        type:
          type: string
          const: cli-contracts/extract
        extractedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of extraction.
        specVersion:
          type: string
          description: CLI Contracts spec version from the source.
        commands:
          type: array
          items:
            type: string
          description: List of command IDs that were extracted.

    DiffResult:
      type: object
      required: [hasBreakingChanges, changes]
      properties:
        hasBreakingChanges:
          type: boolean
        breakingCount:
          type: integer
          minimum: 0
        nonBreakingCount:
          type: integer
          minimum: 0
        changes:
          type: array
          items:
            $ref: '#/components/schemas/DiffChange'

    DiffChange:
      type: object
      required: [type, path, breaking, description]
      properties:
        type:
          type: string
          enum: [added, removed, changed]
        path:
          type: string
          description: JSON pointer to the changed location.
        breaking:
          type: boolean
        description:
          type: string

    # ── AI Agent Interoperability Reference Schemas ──────

    AgentEvidence:
      type: object
      description: >-
        Evidence supporting an agent finding.
        Reference schema for AI agent interoperability.
      required: [kind]
      properties:
        kind:
          type: string
          enum: [file, command, schema, diff, stdout, stderr, text]
        target:
          type: string
          description: Target identifier (file path, command ID, schema name).
        location:
          type: string
          description: Location within the target (line number, JSON pointer).
        excerpt:
          type: string
          description: Relevant excerpt from the target.

    AgentFinding:
      type: object
      description: >-
        A single finding from an agent audit.
        Reference schema for AI agent interoperability.
      required: [severity, category, message]
      properties:
        id:
          type: string
          description: Unique finding identifier.
        severity:
          type: string
          enum: [info, warning, error, critical]
        category:
          type: string
          description: Finding category (e.g. missing-policy, inconsistent-risk).
        target:
          type: string
          description: Target of the finding (command ID, schema path).
        location:
          type: string
          description: Location within the target.
        message:
          type: string
        recommendation:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Confidence score (0-1) for LLM-generated findings.
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/AgentEvidence'
        details:
          type: object
          additionalProperties: true

    AgentRecommendedAction:
      type: object
      description: >-
        A recommended action from an agent audit.
        Reference schema for AI agent interoperability.
      required: [kind, title]
      properties:
        kind:
          type: string
          enum: [run_command, edit_file, review, confirm, block, ignore]
        title:
          type: string
        command:
          type: string
          description: CLI command to run (for run_command kind).
        target:
          type: string
          description: Target file or resource.
        rationale:
          type: string

    AgentAuditResult:
      type: object
      description: >-
        Top-level result from an agent audit.
        Reference schema for AI agent interoperability.
      required: [summary, riskLevel, findings]
      properties:
        summary:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        findings:
          type: array
          items:
            $ref: '#/components/schemas/AgentFinding'
        recommendedActions:
          type: array
          items:
            $ref: '#/components/schemas/AgentRecommendedAction'
        metadata:
          type: object
          properties:
            tool:
              type: string
            command:
              type: string
            version:
              type: string
            generatedAt:
              type: string
            adapter:
              type: string
            model:
              type: string
