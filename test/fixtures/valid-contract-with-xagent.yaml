cli_contracts: 0.1.0

info:
  title: X-Agent Test CLI
  version: 1.0.0
  description: Fixture with complete x-agent policies.

command_sets:
  xagent-test:
    summary: Test CLI with x-agent policies.

    commands:
      safe-read:
        summary: Read data safely.
        exits:
          '0':
            description: Success.
        x-agent:
          risk_level: low
          requires_confirmation: false
          idempotent: true
          side_effects: []

      dangerous-write:
        summary: Write data to database.
        arguments:
          - name: input
            required: true
            schema:
              type: string
            file:
              mode: read
              exists: true
              media_type: text/csv
              encoding: utf-8
        options:
          - name: dry-run
            aliases: [n]
            description: Validate only.
            schema:
              type: boolean
              default: false
        exits:
          '0':
            description: Import succeeded.
          '1':
            description: Unexpected error.
        x-agent:
          risk_level: high
          requires_confirmation: true
          idempotent: false
          side_effects:
            - database_write
          safe_dry_run_option: dry-run
          recommended_before_use:
            - Run with --dry-run first.
            - Validate input file.

      network-op:
        summary: Call external API.
        exits:
          '0':
            description: Success.
          '1':
            description: Error.
        x-agent:
          risk_level: medium
          requires_confirmation: false
          idempotent: true
          side_effects:
            - api_call
          requires_network: true
          requires_secrets:
            - API_KEY
